spring.application.name=er-jpa

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
server.port=8080
# Disable Flyway by default; enable it in the 'dev' profile (application-dev.properties)
spring.flyway.enabled=false

# Default embedded H2 datasource so app starts without external DB
spring.datasource.url=jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
