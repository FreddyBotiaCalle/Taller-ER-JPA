spring.datasource.url=jdbc:mysql://localhost:3306/taller_er_jpa?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Use Flyway for database migrations/seeding in dev
spring.sql.init.mode=never
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration


spring.jpa.open-in-view=false
spring.jpa.show-sql=false

logging.level.org.hibernate=WARN
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.boot.autoconfigure.orm.jpa=WARN
